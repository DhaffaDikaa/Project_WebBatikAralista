<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Ralista Responsif</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="Image/logo.png" alt="Logo Ralista">
        </div>

        <nav>
            <ul class="nav-links" id="nav-menu">
                <li><a href="index.html" class="active">Beranda</a></li>
                <li><a href="katalog.html">Katalog</a></li>
                <li><a href="edukasi.html">Edukasi</a></li>
                <li><a href="profil.html">Profil Usaha</a></li>
                <li><a href="kontak.html">Kontak</a></li>
            </ul>
        </nav>

        <div class="nav-actions">
            <a href="keranjang.html" aria-label="Keranjang"><i class="fas fa-shopping-cart"></i></a>
            <span class="divider">|</span>
            <a href="profil-user.html" aria-label="Profil"><i class="fas fa-user"></i></a>
        </div>

        <div class="hamburger" id="hamburger-btn">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navMenu = document.getElementById('nav-menu');
        hamburgerBtn.addEventListener('click', () => {
            navMenu.classList.toggle('show');
        });
    </script>
</body>

</html>
